<main id="main-content">
    <h1 style="position:absolute;left:-10000px;top:auto;width:1px;height:1px;overflow:hidden;">emergence_1_transcendental_trinity</h1>
    <canvas id="canvas"></canvas>
    
    <div class="title">SIMULATION 1: THE TRANSCENDENTAL TRINITY</div>
    
    <div class="equation" id="equation">
        <div>Dimension 0 → 1</div>
        <div style="margin-top: 20px; font-size: 36px;">
            <span class="highlight">1</span> = the space between <span class="highlight">0</span> and <span class="highlight">∞</span>
        </div>
        <div style="margin-top: 15px; font-size: 28px;">
            <span class="highlight">1/0</span> = <span class="highlight">∞</span>
        </div>
        <div style="margin-top: 15px; font-size: 28px;">
            <span class="highlight">0 × ∞</span> = <span class="highlight">1</span>
        </div>
        <div style="margin-top: 30px; font-size: 20px; color: rgba(255,255,255,0.7);">
            The Transcendental Trinity: 0, 1, ∞
        </div>
        <div style="margin-top: 20px; font-size: 16px; color: rgba(255,200,100,0.6);">
            "It from bit" → "It from qubit"
        </div>
    </div>
    
    <div class="phase-indicator" id="phase">PHASE: 0 / 4</div>
    
    <div class="controls">
        <button class="btn" id="playPauseBtn">PAUSE</button>
        <button class="btn" id="resetBtn">RESET</button>
    </div>
    
    <div class="speed-control">
        SPEED: <span id="speedValue">1.0</span>x<br>
        <label for="speedSlider" style="position:absolute;left:-10000px;">Animation speed</label>
        <input type="range" id="speedSlider" min="0.1" max="3" step="0.1" value="1">
    </div>
