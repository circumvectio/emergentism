<body>
<main id="main-content">
    <h1 style="position:absolute;left:-10000px;top:auto;width:1px;height:1px;overflow:hidden;">emergence_2_second_dimension</h1>
    <canvas id="canvas"></canvas>
    
    <div class="title">SIMULATION 2: SECOND DIMENSION EMERGENCE</div>
    
    <div class="equation" id="equation">
        <div style="margin-bottom: 20px;">The Line Extends Both Ways</div>
        <div style="font-size: 36px;">
            <span class="highlight">+∞</span> ↔ <span class="highlight">-∞</span>
        </div>
        <div style="margin-top: 25px; font-size: 24px; color: rgba(255,255,255,0.8);">
            A circle with infinite diameter<br>
            and slope of zero emerges
        </div>
        <div style="margin-top: 30px; font-size: 20px; color: rgba(100,200,255,0.8);">
            Second Dimension: The Complete Line
        </div>
        <div style="margin-top: 15px; font-size: 16px; color: rgba(0,255,170,0.6);">
            ∴ Line completes → Circle appears
        </div>
    </div>
    
    <div class="phase-indicator" id="phase">PHASE: 0 / 5</div>
    
    <div class="controls">
        <button class="btn" id="playPauseBtn">PAUSE</button>
        <button class="btn" id="resetBtn">RESET</button>
    </div>
    
    <div class="speed-control">
        SPEED: <span id="speedValue">1.0</span>x<br>
        <label for="speedSlider" style="position:absolute;left:-10000px;">Animation speed</label>
        <input type="range" id="speedSlider" min="0.1" max="3" step="0.1" value="1">
    </div>
    
    <script src="emergence_2_second_dimension.inline1.js"></script>
