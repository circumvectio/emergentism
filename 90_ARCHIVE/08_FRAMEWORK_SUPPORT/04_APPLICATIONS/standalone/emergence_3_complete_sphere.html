<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulation 3: The Complete Burri Sphere | Burri Sphere Emergence</title>
    <meta name="description" content="Standalone website and product context.">
    <link rel="canonical" href="#">
    <meta property="og:title" content="Simulation 3: The Complete Burri Sphere | Burri Sphere Emergence">
    <meta property="og:description" content="Standalone website and product context.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

<body>
<main id="main-content">
    <h1 style="position:absolute;left:-10000px;top:auto;width:1px;height:1px;overflow:hidden;">emergence_3_complete_sphere</h1>
    <canvas id="canvas"></canvas>
    
    <div class="title">SIMULATION 3: THE COMPLETE BURRI SPHERE</div>
    
    <div class="equation-main" id="equation">
        <span class="symbol">&#8855;</span> = <span class="symbol">&#9675;</span> &times; <span class="symbol">&#8226;</span>
        <span class="explain">The Burri Sphere: where all dimensions converge</span>
    </div>
    
    <div class="legend" id="legend">
        <div class="legend-item">
            <span>North Pole (0)</span>
            <div class="legend-color" style="background: #ff3333; box-shadow: 0 0 5px #ff3333;"></div>
        </div>
        <div class="legend-item">
            <span>South Pole (∞)</span>
            <div class="legend-color" style="background: #33ff33; box-shadow: 0 0 5px #33ff33;"></div>
        </div>
        <div class="legend-item">
            <span>Equator (Complex Plane)</span>
            <div class="legend-color" style="background: #ffcc00; box-shadow: 0 0 5px #ffcc00;"></div>
        </div>
        <div class="legend-item">
            <span>φ-axis (horizontal)</span>
            <div class="legend-color" style="background: #ff6600; box-shadow: 0 0 5px #ff6600;"></div>
        </div>
        <div class="legend-item">
            <span>ν-axis (vertical)</span>
            <div class="legend-color" style="background: #00ffaa; box-shadow: 0 0 5px #00ffaa;"></div>
        </div>
    </div>
    
    <divclass="phase-indicator" id="phase">PHASE: 0 / 5</div>
    <div class="three-d-indicator" id="depth">PERSPECTIVE: 2D</div>
    
    <div class="controls">
        <button class="btn" id="playPauseBtn">PAUSE</button>
        <button class="btn" id="resetBtn">RESET</button>
    </div>
    
    <div class="speed-control">
        SPEED: <span id="speedValue">1.0</span>x<br>
        <label for="speedSlider" style="position:absolute;left:-10000px;">Animation speed</label>
        <input type="range" id="speedSlider" min="0.1" max="3" step="0.1" value="1">
    </div>
    
    <script src="emergence_3_complete_sphere.inline1.js"></script>
</main>
</body>
</html>
