<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emergentism Framework</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
      :root {
        --color-blue: #4285F4;
        --color-green: #0F9D58;
        --color-yellow: #F4B400;
        --color-red: #DB4437;
      }

      /* Custom scrollbar for better aesthetics on dark theme */
      ::-webkit-scrollbar {
        width: 10px;
      }
      ::-webkit-scrollbar-track {
        background: #000;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--color-blue);
        border-radius: 5px;
        border: 2px solid #000;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #66a3ff;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #000;
        background-image: linear-gradient(to bottom right, #000000, #111827); /* Black to gray-900 */
      }
      h1, h2, h3, h4, h5, h6, .font-display {
        font-family: 'Orbitron', sans-serif;
      }

      /* Simple fade-in animation */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .fade-in {
        animation: fadeIn 0.8s ease-out forwards;
        opacity: 0;
      }
      .fade-in-delay-1 { animation-delay: 0.2s; }
      .fade-in-delay-2 { animation-delay: 0.4s; }
      .fade-in-delay-3 { animation-delay: 0.6s; }
    </style>
  <script type="importmap">

    "react": "https://aistudiocdn.com/react@^19.2.0"
  }
}
</script>
</head>

    <div id="root"></div>

  </body>
</html>
