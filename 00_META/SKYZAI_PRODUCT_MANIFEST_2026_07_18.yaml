# Grading is on receipts, not doctrine. Ladder: L0 concept · L1 doctrine ·
# L2 spec · L3 built-not-integrated · L4 integrated · L5 live.
# Binding constraint of the whole family: L3->L4 (one live cross-organ packet).
# The apex is a >=2-natural-person K2 signer, never any component below.

