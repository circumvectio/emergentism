# conformance lint and by 02_SKYZAI/00_OPERATING_MODEL.md.
#
# What it corrects (the org verdict's three fixes, applied here):
#   FIX 1  PRISM is reclassified out of the organ list -> bucket: membrane-apex.
#   FIX 2  Evolutionary.Network is given ONE canonical_home; its other filings
#          become pointer-stubs (noted per component).
