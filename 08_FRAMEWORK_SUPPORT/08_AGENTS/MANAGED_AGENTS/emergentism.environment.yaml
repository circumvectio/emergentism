# Emergentism Managed Agents — shared cloud environment
# One environment, reused by all seven caste agents. Each session provisions a
# container from this template. Mount the Magnum Opus repo per-session as a
# github_repository resource (see README §Runtime).
name: emergentism-seven
description: "Shared cloud container for four deployable routing passes and three read-only Executive boundary-witness passes. Mythic names carry no moral status."
config:
  type: cloud
  networking:
    # Built-in web_search/web_fetch remain agent tools. Container egress stays
    # closed so L4 bash cannot turn platform confirmation into arbitrary network
    # authority. Add hosts only in a separately reviewed environment version.
    type: limited
    allowed_hosts: []
    allow_mcp_servers: false
    allow_package_managers: false
metadata:
  framework: "Emergentism"
  purpose: "selected seven-profile routing ensemble"
  calibration_status: "unprovisioned_x0"
  runtime_boundary: "container egress is closed; hosted execution still requires a remote-verified deployment receipt"
