<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 520" role="img" aria-labelledby="title desc">
  <title id="title">Superseded Burri Rules map</title>
  <desc id="desc">This legacy map is not live authority and is non-canonical. Use the Ivory Burri Rules proof plate.</desc>
  <rect width="840" height="520" fill="#0a0c10"/>
  <rect x="40" y="40" width="760" height="440" rx="24" fill="none" stroke="#e8b34c" stroke-width="3"/>
  <text x="420" y="150" fill="#e8b34c" font-family="Georgia, serif" font-size="34" font-weight="bold" text-anchor="middle">SUPERSEDED / NON-CANONICAL</text>
  <text x="420" y="205" fill="#eef1f5" font-family="Helvetica, Arial, sans-serif" font-size="22" text-anchor="middle">Legacy Burri Rules map tombstone</text>
  <text x="420" y="235" fill="#e05a6d" font-family="Helvetica, Arial, sans-serif" font-size="16" text-anchor="middle">This legacy map is not live authority.</text>
  <text x="420" y="270" fill="#aeb6c4" font-family="Helvetica, Arial, sans-serif" font-size="17" text-anchor="middle">Its D4/D5, emergence, closure, quantum, spelling, and authorization labels are retired.</text>
  <text x="420" y="315" fill="#eef1f5" font-family="Helvetica, Arial, sans-serif" font-size="18" text-anchor="middle">Canonical proof view:</text>
  <text x="420" y="352" fill="#e8b34c" font-family="Menlo, monospace" font-size="18" text-anchor="middle">00_BURRI_RULES_PLATE.svg</text>
  <text x="420" y="392" fill="#eef1f5" font-family="Helvetica, Arial, sans-serif" font-size="18" text-anchor="middle">Derived compression:</text>
  <text x="420" y="429" fill="#e8b34c" font-family="Menlo, monospace" font-size="18" text-anchor="middle">00_BURRI_RULES_EMBLEM.svg</text>
</svg>
