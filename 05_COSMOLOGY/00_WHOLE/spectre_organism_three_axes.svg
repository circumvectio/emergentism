    <text x="138" y="788" font-size="12" font-weight="bold" fill="#1a1a1a">Doctrine</text>
    <text x="320" y="788" font-size="11" font-family="Menlo, monospace" fill="#6b6b6b">01_EMERGENTISM_ORG/  ·  Rosetta master</text>
    <text x="980" y="788" font-size="10" font-style="italic" fill="#8b6f47">Caṇḍāla  ·  firewall  ·  low Φ  ·  high ν</text>

    <text x="100" y="812" font-size="12" font-weight="bold" fill="#1a1a1a">L0</text>
    <text x="138" y="812" font-size="12" font-weight="bold" fill="#1a1a1a">Agentz</text>
    <text x="320" y="812" font-size="11" font-family="Menlo, monospace" fill="#6b6b6b">agentz.cloud  ·  integration / dispatch</text>
