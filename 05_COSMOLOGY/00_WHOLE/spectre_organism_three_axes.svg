    <text x="200" y="1110" text-anchor="middle" font-size="10" font-style="italic" fill="#6b6b6b">no extraction</text>
    <text x="200" y="1126" text-anchor="middle" font-size="9" fill="#6b6b6b">fees only on value created</text>

    <text x="370" y="1085" text-anchor="middle" font-size="26" font-weight="bold" fill="#1a1a1a">K2</text>
    <text x="370" y="1110" text-anchor="middle" font-size="10" font-style="italic" fill="#6b6b6b">human signs</text>
    <text x="370" y="1126" text-anchor="middle" font-size="9" fill="#6b6b6b">irreversible acts require a person</text>

    <text x="540" y="1085" text-anchor="middle" font-size="26" font-weight="bold" fill="#1a1a1a">K3</text>
    <text x="540" y="1110" text-anchor="middle" font-size="10" font-style="italic" fill="#6b6b6b">archive-first</text>
    <text x="540" y="1126" text-anchor="middle" font-size="9" fill="#6b6b6b">no convenient forgetting</text>

    <text x="710" y="1085" text-anchor="middle" font-size="26" font-weight="bold" fill="#1a1a1a">K4</text>
    <text x="710" y="1110" text-anchor="middle" font-size="10" font-style="italic" fill="#6b6b6b">grace exit</text>
    <text x="710" y="1126" text-anchor="middle" font-size="9" fill="#6b6b6b">leave with everything</text>

    <text x="880" y="1085" text-anchor="middle" font-size="26" font-weight="bold" fill="#1a1a1a">A7</text>
    <text x="880" y="1110" text-anchor="middle" font-size="10" font-style="italic" fill="#6b6b6b">tier every claim</text>
    <text x="880" y="1126" text-anchor="middle" font-size="9" fill="#6b6b6b">self-correction mandatory</text>
  </g>

  <!-- separator vertical -->
