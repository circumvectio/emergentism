    <text x="95" y="32" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">TheCircle</text>
    <text x="95" y="52" text-anchor="middle" font-size="11" font-style="italic" fill="#5a3d2b">IS  ·  Beauty</text>
