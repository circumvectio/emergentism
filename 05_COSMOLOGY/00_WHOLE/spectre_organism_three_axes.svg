    <text x="100" y="764" font-size="12" font-weight="bold" fill="#1a1a1a">L2</text>
    <text x="138" y="764" font-size="12" font-weight="bold" fill="#1a1a1a">Row App</text>
    <text x="320" y="764" font-size="11" font-family="Menlo, monospace" fill="#6b6b6b">10_AGENTS/  ·  Skyzai-local rows</text>
