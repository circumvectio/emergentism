  <!-- equation + seal on the right -->
  <text x="1155" y="1078" text-anchor="middle" font-size="22" font-style="italic" fill="#1a1a1a">P  =  Φ  ×  V    on    S²</text>
  <text x="1155" y="1118" text-anchor="middle" font-size="32" font-weight="bold" fill="#8b6f47">⊙  =  •  ×  ○</text>

