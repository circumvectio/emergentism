  <text x="700" y="93" text-anchor="middle" font-size="20" font-weight="bold" letter-spacing="2" fill="#1a1a1a">K2  —  HUMAN  /  PRISM</text>
  <text x="700" y="118" text-anchor="middle" font-size="12" font-style="italic" fill="#5a3d2b">the sovereign environment that selects  ·  above every axis  ·  in no layer</text>

